    }

    function sourceVideoCacheKey(record) {
      return record.id || record.metadata_path || record.video_path;
    }

    async function resolveTwitterVideoUrl(record) {
      const directUrl = directTwitterVideoUrl(record);
      const cacheKey = sourceVideoCacheKey(record);
      if (directUrl) {
        sourceVideoUrlCache.set(cacheKey, directUrl);
        return directUrl;
      }
      if (sourceVideoUrlCache.has(cacheKey)) return sourceVideoUrlCache.get(cacheKey);
      if (!record.metadata_path) return "";

      const response = await fetch(record.metadata_path, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const metadata = await response.json();
      const metadataUrl = typeof metadata.video_url === "string" ? metadata.video_url.trim() : "";
      if (metadataUrl) record.source_video_url = metadataUrl;
      sourceVideoUrlCache.set(cacheKey, metadataUrl);
      return metadataUrl;
    }

    async function applySelectedPlayerSource(record = state.selected, shouldPlay = false) {
      const requestToken = playerSourceRequestToken + 1;
      playerSourceRequestToken = requestToken;
      if (!record) {
        el.player.removeAttribute("src");
        el.player.load();
        return;
      }

      if (state.playerSource === PLAYER_SOURCE_SERVER) {
        el.player.src = record.video_path;
        el.nowPlaying.textContent = nowPlayingText(record);
        if (shouldPlay) requestPlayerPlay();
        return;
      }

      const directUrl = directTwitterVideoUrl(record);
      if (directUrl) {
        el.player.src = directUrl;
        el.nowPlaying.textContent = nowPlayingText(record);
        if (shouldPlay) requestPlayerPlay();
        return;
      }

      el.nowPlaying.textContent = nowPlayingText(record, uiText("sourceLoading"));
      el.player.removeAttribute("src");
      el.player.load();
      try {
        const twitterUrl = await resolveTwitterVideoUrl(record);
        if (requestToken !== playerSourceRequestToken || state.selected?.id !== record.id || state.playerSource !== PLAYER_SOURCE_TWITTER) return;
        if (twitterUrl) {
          el.player.src = twitterUrl;
          el.nowPlaying.textContent = nowPlayingText(record);
          if (shouldPlay) requestPlayerPlay();
        } else {
          el.player.removeAttribute("src");
          el.player.load();
          el.nowPlaying.textContent = nowPlayingText(record, uiText("sourceMissing"));
        }
      } catch {
        if (requestToken !== playerSourceRequestToken || state.selected?.id !== record.id || state.playerSource !== PLAYER_SOURCE_TWITTER) return;
        el.player.removeAttribute("src");
        el.player.load();
        el.nowPlaying.textContent = nowPlayingText(record, uiText("sourceFailed"));
      }
    }

    function normalizeCategory(value) {
      const text = String(value || "").trim();
      if (!text) return "未分类";
      const key = text.toLowerCase();
      if (key === DELETE_CATEGORY || key === "other" || key === "unclear") return DELETE_CATEGORY;
      return text;
    }

    function categoryOf(record) {
      return normalizeCategory(record.curated?.category);
    }

    function shouldEnterLibrary(record) {
      return shouldShowDeleteCategory() || categoryOf(record) !== DELETE_CATEGORY;
    }

    function shouldShowDeleteCategory() {
      return !state.onlineMode;
    }

    function categoryFacetEntries(entries) {
      return shouldShowDeleteCategory() ? entries : entries.filter(([name]) => name !== DELETE_CATEGORY);
    }

    function canWriteManualCategories() {
      return !state.onlineMode && state.writeApiAvailable;
    }

    async function loadManualEdits() {
      if (state.onlineMode) {
        state.writeApiAvailable = false;
        return defaultManualEdits();
      }

      try {
        const response = await fetch("/api/manual-edits", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        state.writeApiAvailable = true;
        return normalizeManualEdits(await response.json());
      } catch {
        state.writeApiAvailable = false;
      }

      try {
        const response = await fetch("library/manual-edits.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return normalizeManualEdits(await response.json());
      } catch {
        return defaultManualEdits();
      }
    }

    function applyManualEditsToRecords() {
      const excluded = state.manualEdits.excluded || {};
      const overrides = state.manualEdits.category_overrides || {};
      state.records = state.allRecords
        .filter(record => !excluded[record.id])
        .map(record => {
          const override = overrides[record.id];
          if (!override?.category) return record;
          const curated = { ...(record.curated || {}), tags: curatedTags(record) };
          curated.category = override.category;
          curated.manual_category = true;
          curated.manual_updated_at = override.updated_at;
          return { ...record, curated };
        })
        .filter(shouldEnterLibrary);

      if (state.selected) {
        const nextSelected = state.records.find(record => record.id === state.selected.id);
        state.selected = nextSelected || null;
        if (!state.selected) {
          clearPlayerSource();
          el.nowPlaying.textContent = uiText("selectClip");
        }
      }
    }

    async function postManualEdit(action, payload) {
      const response = await fetch(`/api/manual-edits/${action}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || uiText("writeFailed"));
      state.writeApiAvailable = true;
      state.manualEdits = normalizeManualEdits(data.edits);
      applyManualEditsToRecords();
      return data;
    }

    function setEditStatus(message, isError = false) {
      el.resultSubtitle.textContent = message;
      el.resultSubtitle.style.color = isError ? "var(--red)" : "var(--muted)";
    }

    function manualWriteHint(error) {
      return uiText("writeHint", { detail: error?.message || "" });
    }

    function curatedTags(record) {
      return record.curated?.tags || [];
    }

    function storyboardTags(record) {
      return record.curated?.storyboard_tags || [];
    }

    function storyboardTagLabel(tag) {
      const label = STORYBOARD_TAG_LABELS[tag];
      return label ? `${label} ${tag}` : tag;
    }

    function compareStoryboardTags(a, b) {
      const rankA = STORYBOARD_TAG_ORDER_INDEX.has(a) ? STORYBOARD_TAG_ORDER_INDEX.get(a) : STORYBOARD_TAG_DISPLAY_ORDER.length;
      const rankB = STORYBOARD_TAG_ORDER_INDEX.has(b) ? STORYBOARD_TAG_ORDER_INDEX.get(b) : STORYBOARD_TAG_DISPLAY_ORDER.length;
      return rankA - rankB || storyboardTagLabel(a).localeCompare(storyboardTagLabel(b));
    }

    function sortStoryboardTagsForDisplay(tags) {
      return [...tags].sort(compareStoryboardTags);
    }

    function sortStoryboardFacetEntries(entries, limit) {
      return entries
        .slice(0, limit)
        .sort(([tagA, countA], [tagB, countB]) => compareStoryboardTags(tagA, tagB) || countB - countA);
    }

    function allTags(record) {
      return [...curatedTags(record), ...(record.source_tags || [])];
    }

    function allSearchTags(record) {
      return [...allTags(record), ...storyboardTags(record)];
    }

    function ratioOf(record) {
      const aspect = Number(record.aspect || 0);
      if (!aspect) return "未知";
      if (aspect > 1.18) return "横屏";
      if (aspect < .86) return "竖屏";
      return "方屏";
    }

    function sourceText(record) {
      return [
        record.id,
        record.author,
        record.tweet_id,
        record.media_id,
        record.created_at,
        record.tweet_text,
        categoryOf(record),
        ratioOf(record),
        ...allSearchTags(record)
      ].join(" ").toLowerCase();
    }

    function fmtDuration(value) {
      const total = Math.floor(Number(value || 0));
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = String(total % 60).padStart(2, "0");
      return h ? `${h}:${String(m).padStart(2, "0")}:${s}` : `${m}:${s}`;
    }

    function tokenize(value) {
      return (String(value || "").match(/"[^"]+"|\S+/g) || [])
        .map(item => item.replace(/^"|"$/g, "").trim())
        .filter(Boolean);
    }

    function parseQuery(value) {
      const filters = [];
      const terms = [];
      tokenize(value).forEach(token => {
        const index = token.indexOf(":");
        if (index > 0) filters.push({ key: token.slice(0, index).toLowerCase(), value: token.slice(index + 1) });
        else terms.push(token.toLowerCase());
      });
      return { filters, terms };
    }

    function compareNumber(actual, expression) {
      const match = String(expression || "").trim().match(/^(<=|>=|<|>|=)?\s*(\d+(?:\.\d+)?)$/);
      if (!match) return false;
      const op = match[1] || "=";
      const target = Number(match[2]);
      const value = Number(actual || 0);
      if (op === "<") return value < target;
      if (op === "<=") return value <= target;
      if (op === ">") return value > target;
      if (op === ">=") return value >= target;
      return value === target;
    }

    function structuredMatch(record, filter) {
      const key = filter.key;
      const value = filter.value;
      const needle = value.toLowerCase();
      if (["author", "user", "作者"].includes(key)) return record.author.toLowerCase().includes(needle);
      if (["category", "cat", "类别"].includes(key)) return categoryOf(record).toLowerCase().includes(needle);
      if (["tag", "标签"].includes(key)) return allTags(record).some(tag => tag.toLowerCase().includes(needle));
      if (isStoryboardFilterKey(key)) return storyboardTags(record).some(tag => tag.toLowerCase().includes(needle));
      if (["source", "hashtag", "原tag"].includes(key)) return (record.source_tags || []).some(tag => tag.toLowerCase().includes(needle));
      if (["tweet", "id"].includes(key)) return String(record.tweet_id || "").includes(value) || String(record.media_id || "").includes(value);
      if (["year", "年份"].includes(key)) return String(record.created_at || "").startsWith(value);
      if (["duration", "dur", "时长"].includes(key)) return compareNumber(record.duration, value);
      if (["ratio", "比例"].includes(key)) return ratioOf(record).toLowerCase().includes(needle);
      if (["fav", "favorite", "收藏"].includes(key)) return state.favorites.has(record.id) === !["0", "false", "no", "否"].includes(needle);
      return sourceText(record).includes(needle);
    }

    function countBy(records, getter) {
      const map = new Map();
      records.forEach(record => {
        const values = getter(record);
        (Array.isArray(values) ? values : [values]).forEach(value => {
          if (!value) return;
          map.set(value, (map.get(value) || 0) + 1);
        });
      });
      return [...map.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    }

    function renderStats() {
      const totalDuration = state.records.reduce((sum, item) => sum + Number(item.duration || 0), 0);
      el.statGrid.innerHTML = [
        [uiText("statItems"), state.records.length],
        [uiText("statDuration"), fmtDuration(totalDuration)]
      ].map(([label, value]) => `<div class="stat"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span></div>`).join("");
      el.librarySummary.textContent = uiText("librarySummary", {
        count: state.records.length,
        duration: fmtDuration(totalDuration)
      });
    }

    function isStoryboardFilterKey(key) {
      return ["story", "storyboard", "shot", "分镜", "语义"].includes(key);
    }

    function renderFacet(container, entries, activeValue, onPick, limit = 12, labelFor = value => value) {
      container.innerHTML = "";
      [[ALL, state.records.length], ...entries.slice(0, limit)].forEach(([name, count]) => {
        const label = name === ALL ? uiText("all") : labelFor(name);
        const button = document.createElement("button");
        button.type = "button";
        button.className = name === activeValue ? "active" : "";
        button.innerHTML = `<span class="name">${escapeHtml(label)}</span><span class="count">${count}</span>`;
        button.addEventListener("click", () => {
          onPick(name);
          state.renderLimit = LOAD_BATCH_SIZE;
          applyFilters();
        });
        container.appendChild(button);
      });
    }

    function renderCategoryFacet(entries) {
      el.categoryFacet.innerHTML = "";
      const visibleEntries = categoryFacetEntries(entries);
      [[ALL, state.records.length], ...visibleEntries.slice(0, 8)].forEach(([name, count]) => {
        const row = document.createElement("div");

        const button = document.createElement("button");
        button.type = "button";
        button.className = name === state.category ? "active" : "";
        const label = name === ALL ? uiText("all") : categoryLabel(name);
        button.innerHTML = `<span class="name">${escapeHtml(label)}</span><span class="count">${count}</span>`;
        button.addEventListener("click", () => {
          state.category = name;
          state.renderLimit = LOAD_BATCH_SIZE;
          applyFilters();
        });
        row.appendChild(button);

        el.categoryFacet.appendChild(row);
      });
    }

    function renderFacets() {
      const categories = countBy(state.records, categoryOf);
      const authors = countBy(state.records, record => record.author);
      const tags = countBy(state.records, record => allTags(record));
      const storyboardTagsCount = countBy(state.records, record => storyboardTags(record));
      el.categoryCount.textContent = categoryFacetEntries(categories).length;
      el.authorCount.textContent = authors.length;
      el.tagCount.textContent = tags.length;
      el.storyboardTagCount.textContent = storyboardTagsCount.length;
      renderCategoryFacet(categories);
      renderFacet(el.authorFacet, authors, state.author, value => state.author = value, 8);
      renderFacet(el.tagFacet, tags, state.tag, value => state.tag = value, 18);
      renderFacet(el.storyboardTagFacet, sortStoryboardFacetEntries(storyboardTagsCount, 18), state.storyboardTag, value => state.storyboardTag = value, 18, storyboardTagLabel);
    }

    function renderActiveFilters(parsed) {
      el.activeFilters.innerHTML = "";
      const chips = [];
      if (state.category !== ALL) chips.push([uiText("activeCategory"), categoryLabel(state.category), () => state.category = ALL]);
      if (state.author !== ALL) chips.push([uiText("activeAuthor"), state.author, () => state.author = ALL]);
      if (state.tag !== ALL) chips.push([uiText("activeTwitterTags"), state.tag, () => state.tag = ALL]);
      if (state.storyboardTag !== ALL) chips.push([uiText("activeCommonTags"), storyboardTagLabel(state.storyboardTag), () => state.storyboardTag = ALL]);
      if (state.favoritesOnly) chips.push([uiText("activeFavorites"), uiText("activeOn"), () => state.favoritesOnly = false]);
      parsed.filters.forEach(filter => {
        chips.push(isStoryboardFilterKey(filter.key)
          ? [uiText("activeCommonTags"), storyboardTagLabel(filter.value), null]
          : [filter.key, filter.value, null]);
      });
      if (parsed.terms.length) chips.push([uiText("activeKeyword"), parsed.terms.join(" "), null]);

      chips.forEach(([label, value, clear]) => {
        const node = document.createElement(clear ? "button" : "span");
        node.className = "pill";
        node.textContent = `${label}: ${value}`;
        if (clear) {
          node.type = "button";
          node.addEventListener("click", () => {
            clear();
            state.renderLimit = LOAD_BATCH_SIZE;
            applyFilters();
          });
        }
        el.activeFilters.appendChild(node);
      });

      if (chips.length) {
        const clearAll = document.createElement("button");
        clearAll.type = "button";
        clearAll.className = "pill clear";
        clearAll.textContent = uiText("clearFilters");
        clearAll.addEventListener("click", resetFilters);
        el.activeFilters.appendChild(clearAll);
      }
    }

    function applyFilters() {
      const parsed = parseQuery(state.query);
      state.filtered = state.records.filter(record => {
        if (state.category !== ALL && categoryOf(record) !== state.category) return false;
        if (state.author !== ALL && record.author !== state.author) return false;
        if (state.tag !== ALL && !allTags(record).includes(state.tag)) return false;
        if (state.storyboardTag !== ALL && !storyboardTags(record).includes(state.storyboardTag)) return false;
        if (state.favoritesOnly && !state.favorites.has(record.id)) return false;
        if (!parsed.filters.every(filter => structuredMatch(record, filter))) return false;
        const haystack = sourceText(record);
        return parsed.terms.every(term => haystack.includes(term));
      });

      const sorters = {
        "date-desc": (a, b) => String(b.created_at || "").localeCompare(String(a.created_at || "")),
        "date-asc": (a, b) => String(a.created_at || "").localeCompare(String(b.created_at || "")),
        "duration-desc": (a, b) => Number(b.duration || 0) - Number(a.duration || 0),
        "duration-asc": (a, b) => Number(a.duration || 0) - Number(b.duration || 0),
        "author": (a, b) => a.author.localeCompare(b.author) || String(b.created_at || "").localeCompare(String(a.created_at || ""))
      };
      state.filtered.sort(sorters[state.sort]);

      renderActiveFilters(parsed);
      renderFacets();
      renderSummary();
      renderGrid();
      renderInspector();
      syncControls();
      saveState();
    }

    function renderSummary() {
      const duration = state.filtered.reduce((sum, item) => sum + Number(item.duration || 0), 0);
      const categoryCounts = countBy(state.filtered, categoryOf).slice(0, 3);
      const ratioCounts = countBy(state.filtered, ratioOf).slice(0, 3);
      el.resultTitle.textContent = uiText("resultCount", {
        filtered: state.filtered.length,
        total: state.records.length
      });
      el.resultSubtitle.style.color = "var(--muted)";
      el.resultSubtitle.textContent = state.query ? uiText("searchResult", { query: state.query }) : uiText("queueHint");
      el.summaryStrip.innerHTML = [
        [uiText("summaryDuration"), fmtDuration(duration)],
        [uiText("summaryFavorites"), state.filtered.filter(item => state.favorites.has(item.id)).length],
        ...categoryCounts.map(([label, value]) => [categoryLabel(label), value]),
        ...ratioCounts
      ].map(([label, value]) => `<span class="summary-chip"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></span>`).join("");
    }

    function renderGrid() {
      el.clipGrid.innerHTML = "";
      if (!state.filtered.length) {
        el.clipGrid.innerHTML = `<div class="empty">${uiText("noMatches")}</div>`;
        el.loadMoreWrap.style.display = "none";
        return;
      }

      const groupCounts = new Map();
      state.records.forEach(record => {
        if (!record.tweet_group_key) return;
        groupCounts.set(record.tweet_group_key, (groupCounts.get(record.tweet_group_key) || 0) + 1);
      });
      const fragment = document.createDocumentFragment();
      state.filtered.slice(0, state.renderLimit).forEach((record, index) => {
        const isFavorite = state.favorites.has(record.id);
        const groupTotal = record.tweet_group_key ? groupCounts.get(record.tweet_group_key) || 1 : 1;
        const mediaIndex = Number(record.media_index);
        const favoriteLabel = isFavorite ? uiText("unfavorite") : uiText("favorite");
        const shotInfo = uiText("shotInfo", {
          index: Number.isFinite(mediaIndex) ? mediaIndex + 1 : 1,
          total: groupTotal,
          width: record.width || "?",
          height: record.height || "?",
          ratio: ratioOf(record)
        });
        const card = document.createElement("article");
        card.className = `clip-card ${state.selected?.id === record.id ? "active" : ""}`;
        card.dataset.id = record.id;
        card.innerHTML = `
          <div class="poster">
            <img src="${escapeAttr(record.thumb_path)}" loading="lazy" alt="">
            <span class="card-badge">#${index + 1}</span>
            <button class="favorite-toggle ${isFavorite ? "favorited" : ""}" type="button" data-card-action="favorite" aria-label="${escapeAttr(favoriteLabel)}" aria-pressed="${String(isFavorite)}" title="${escapeAttr(favoriteLabel)}">
              <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                <path d="M32 7.5 40.2 23.4 58 26.2 45.2 38.8 48.2 56.5 32 48 15.8 56.5 18.8 38.8 6 26.2 23.8 23.4 32 7.5Z"></path>
              </svg>
            </button>
            <span class="duration">${fmtDuration(record.duration)}</span>
          </div>
          <div class="card-body">
            <div class="card-title">
              <strong>@${escapeHtml(record.author)}</strong>
              <span class="category">${escapeHtml(categoryLabel(categoryOf(record)))}</span>
            </div>
            <div class="tag-row">
              ${curatedTags(record).slice(0, 2).map(tag => tagChip(tag)).join("")}
              ${sortStoryboardTagsForDisplay(storyboardTags(record)).slice(0, 3).map(tag => tagChip(tag, "story")).join("")}
              ${(record.source_tags || []).slice(0, 2).map(tag => tagChip(tag, true)).join("")}
            </div>
            <div class="card-shot-info">${escapeHtml(shotInfo)}</div>
            <div class="card-meta">${escapeHtml(record.created_at || "")} · ${escapeHtml(ratioOf(record))} · ${record.width || "?"}x${record.height || "?"}</div>
          </div>
        `;
        card.addEventListener("click", event => {
          const action = event.target.closest("[data-card-action]")?.dataset.cardAction;
          if (action) {
            event.stopPropagation();
            if (action === "favorite") toggleFavorite(record);
            return;
          }

          const tag = event.target.closest("[data-tag]")?.dataset.tag;
          if (tag) {
            event.stopPropagation();
            state.tag = tag;
            state.renderLimit = LOAD_BATCH_SIZE;
            applyFilters();
            return;
          }
          const storyboardTag = event.target.closest("[data-storyboard-tag]")?.dataset.storyboardTag;
          if (storyboardTag) {
            event.stopPropagation();
            state.storyboardTag = storyboardTag;
            state.renderLimit = LOAD_BATCH_SIZE;
            applyFilters();
            return;
          }
          selectRecordFromCard(record);
        });
        fragment.appendChild(card);
      });
      el.clipGrid.appendChild(fragment);

      const remaining = state.filtered.length - state.renderLimit;
      el.loadMoreWrap.style.display = remaining > 0 ? "block" : "none";
      el.loadMoreButton.textContent = remaining > 0
        ? uiText("loadMore", { count: Math.min(LOAD_BATCH_SIZE, remaining), remaining })
        : uiText("allLoaded");
    }

    function remainingResults() {
      return Math.max(0, state.filtered.length - state.renderLimit);
    }

    function loadMoreResults(continueIfNearBottom = false) {
      if (remainingResults() <= 0) return false;
      state.renderLimit = Math.min(state.renderLimit + LOAD_BATCH_SIZE, state.filtered.length);
      renderGrid();
      if (continueIfNearBottom) requestAutoLoadCheck();
      return true;
    }

    function isScrollable(element) {
      return element && element.scrollHeight > element.clientHeight + 1;
    }

    function isNearBottom(element, clientHeight = element.clientHeight) {
      return element.scrollHeight - element.scrollTop - clientHeight <= AUTO_LOAD_THRESHOLD_PX;
    }

    function shouldAutoLoadMore() {
      if (remainingResults() <= 0) return false;
      if (isScrollable(el.galleryScroll)) return isNearBottom(el.galleryScroll);

      const pageScroller = document.scrollingElement || document.documentElement;
      return isScrollable(pageScroller) && isNearBottom(pageScroller, window.innerHeight);
    }

    function requestAutoLoadCheck() {
      if (autoLoadCheckPending) return;
      autoLoadCheckPending = true;
      requestAnimationFrame(() => {
        autoLoadCheckPending = false;
        if (shouldAutoLoadMore()) loadMoreResults(true);
      });
    }

    function tagChip(tag, variant = "") {
      const mode = variant === true ? "source" : variant;
      const dataAttr = mode === "story" ? "data-storyboard-tag" : "data-tag";
      const label = mode === "story" ? storyboardTagLabel(tag) : tag;
      return `<button class="tag-chip ${escapeAttr(mode)}" type="button" ${dataAttr}="${escapeAttr(tag)}">${escapeHtml(label)}</button>`;
    }

    function selectRecord(record, shouldPlay) {
      state.selected = record;
      applySelectedPlayerSource(record, shouldPlay);
      renderGrid();
      renderInspector();
      syncControls();
    }

    function selectRecordFromCard(record) {
      selectRecord(record, true);
      if (isMobilePlayerLayout()) expandPlayer("mobile-card");
    }

    function manualCategoryControls(record) {
      if (!canWriteManualCategories()) return "";
      const current = categoryOf(record);
      return `
        <section class="panel">
          <h2>${escapeHtml(uiText("manualCategory"))}</h2>
          <div class="manual-category-actions">
            ${MANUAL_CATEGORY_OPTIONS.map(category => {
              const active = current === category;
              return `<button type="button" data-manual-category="${escapeAttr(category)}" class="${active ? "active" : ""}" aria-pressed="${String(active)}">${escapeHtml(categoryLabel(category))}</button>`;
            }).join("")}
          </div>
        </section>
      `;
    }

    async function updateManualCategory(record, category) {
      if (!record || !MANUAL_CATEGORY_OPTIONS.includes(category) || !canWriteManualCategories()) return;
      if (categoryOf(record) === category) return;
      try {
        await postManualEdit("category", {
          id: record.id,
          category,
          previous_category: categoryOf(record)
        });
        state.renderLimit = LOAD_BATCH_SIZE;
        applyFilters();
        setEditStatus(uiText("categoryUpdated", { category: categoryLabel(category) }));
      } catch (error) {
        setEditStatus(manualWriteHint(error), true);
      }
    }

    function renderInspector() {
      const record = state.selected;
      if (!record) {
        el.inspectorScroll.innerHTML = `<div class="empty">${uiText("inspectorEmpty")}</div>`;
        el.favoriteButton.textContent = uiText("favorite");
        el.favoriteButton.classList.remove("active");
        el.copyPathButton.disabled = true;
        return;
      }

      el.copyPathButton.disabled = false;
      const group = state.records
        .filter(item => item.tweet_group_key === record.tweet_group_key)
        .sort((a, b) => (a.media_index ?? 0) - (b.media_index ?? 0) || a.id.localeCompare(b.id));
      el.inspectorScroll.innerHTML = `
        <section class="panel">
          <h2>${escapeHtml(uiText("groupStoryboard"))}</h2>
          <div class="group-list">
            ${group.map(item => miniItem(item, item.id === record.id, group.length)).join("")}
          </div>
        </section>
        <section class="panel">
          <h2>${escapeHtml(uiText("mediaInfo"))}</h2>
          <div class="meta-table">
            <span>${escapeHtml(uiText("author"))}</span><span>@${escapeHtml(record.author)}</span>
            <span>${escapeHtml(uiText("category"))}</span><span>${escapeHtml(categoryLabel(categoryOf(record)))}</span>
            <span>${escapeHtml(uiText("commonTags"))}</span><span>${sortStoryboardTagsForDisplay(storyboardTags(record)).map(tag => escapeHtml(storyboardTagLabel(tag))).join(" ") || escapeHtml(uiText("none"))}</span>
            <span>${escapeHtml(uiText("twitterTags"))}</span><span>${allTags(record).map(tag => escapeHtml(tag)).join(" ") || escapeHtml(uiText("none"))}</span>
            <span>${escapeHtml(uiText("size"))}</span><span>${record.width || "?"} x ${record.height || "?"} · ${escapeHtml(ratioOf(record))}</span>
            <span>${escapeHtml(uiText("duration"))}</span><span>${fmtDuration(record.duration)}</span>
            <span>${escapeHtml(uiText("date"))}</span><span>${escapeHtml(record.created_at || "")}</span>
            <span>${escapeHtml(uiText("sourceTweet"))}</span><span>${record.tweet_url ? `<a href="${escapeAttr(record.tweet_url)}" target="_blank" rel="noreferrer">${escapeHtml(record.tweet_id)}</a>` : escapeHtml(record.tweet_id || "")}</span>
          </div>
        </section>
        ${manualCategoryControls(record)}
        <section class="panel">
          <h2>${escapeHtml(uiText("tweetText"))}</h2>
          <p class="tweet-text">${escapeHtml(record.tweet_text || uiText("none"))}</p>
        </section>
      `;

      el.inspectorScroll.querySelectorAll("[data-id]").forEach(node => {
        node.addEventListener("click", () => {
          const next = state.records.find(item => item.id === node.dataset.id);
          if (next) selectRecord(next, true);
        });
      });
      el.inspectorScroll.querySelectorAll("[data-manual-category]").forEach(node => {
        node.addEventListener("click", () => {
          updateManualCategory(record, node.dataset.manualCategory);
        });
      });
    }

    function miniItem(record, active, groupTotal = 1) {
      const mediaIndex = Number(record.media_index);
      const position = Number.isFinite(mediaIndex) ? mediaIndex + 1 : 1;
      return `
        <div class="mini-item ${active ? "active" : ""}" data-id="${escapeAttr(record.id)}">
          <img src="${escapeAttr(record.thumb_path)}" alt="">
          <span class="mini-text">${position}/${groupTotal} · ${escapeHtml(categoryLabel(categoryOf(record)))} · ${fmtDuration(record.duration)}</span>
        </div>
      `;
    }

    function queueIndex(record = state.selected) {
      if (!record) return -1;
      return state.filtered.findIndex(item => item.id === record.id);
    }

    function playOffset(offset) {
      if (!state.filtered.length) return;
      let index = queueIndex();
      if (index < 0) index = offset > 0 ? -1 : 0;
      const nextIndex = Math.min(state.filtered.length - 1, Math.max(0, index + offset));
      selectRecord(state.filtered[nextIndex], true);
    }

    function toggleFavorite(record = state.selected) {
      if (!record) return;
      if (state.favorites.has(record.id)) state.favorites.delete(record.id);
      else state.favorites.add(record.id);
      applyFilters();
    }

    function resetFilters() {
      state.query = "";
      state.category = ALL;
      state.author = ALL;
      state.tag = ALL;
      state.storyboardTag = ALL;
      state.favoritesOnly = false;
      state.renderLimit = LOAD_BATCH_SIZE;
      el.searchInput.value = "";
      applyFilters();
    }

    function syncControls() {
      el.searchInput.value = state.query;
      el.sortSelect.value = state.sort;
      const isDarkTheme = state.theme === "dark";
      el.themeButton.textContent = isDarkTheme ? uiText("themeDark") : uiText("themeLight");
      el.themeButton.setAttribute("aria-pressed", String(isDarkTheme));
      el.themeButton.setAttribute(
        "aria-label",
        uiText("themeAria", { isDark: isDarkTheme })
      );
      el.languageButton.textContent = uiText("languageButton");
      el.languageButton.setAttribute("aria-label", uiText("languageAria"));
      el.languageButton.setAttribute("aria-pressed", String(state.language === "zh"));
      el.favoritesOnlyButton.classList.toggle("active", state.favoritesOnly);
      el.autoplayButton.classList.toggle("active", state.autoplay);
      const isTwitterSource = state.playerSource === PLAYER_SOURCE_TWITTER;
      el.sourceToggleButton.textContent = isTwitterSource ? uiText("sourceTwitter") : uiText("sourceServer");
      el.sourceToggleButton.classList.toggle("active", isTwitterSource);
      el.sourceToggleButton.setAttribute("aria-pressed", String(isTwitterSource));
      el.sourceToggleButton.setAttribute(
        "aria-label",
        uiText("sourceAria", { isTwitter: isTwitterSource })
      );
      const index = queueIndex();
      el.prevButton.disabled = index <= 0;
      el.nextButton.disabled = index < 0 || index >= state.filtered.length - 1;
      const fav = Boolean(state.selected && state.favorites.has(state.selected.id));
      el.favoriteButton.textContent = fav ? uiText("favorited") : uiText("favorite");
      el.favoriteButton.classList.toggle("active", fav);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).catch(() => {});
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("'", "&#39;");
    }

    async function decodeGzipBase64Json(raw) {
      if (!("DecompressionStream" in window)) {
        throw new Error(uiText("gzipUnsupported"));
      }
      const binary = atob(raw);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
      return JSON.parse(await new Response(stream).text());
    }

    async function loadEmbeddedLibraryData() {
      const node = document.getElementById("library-data");
      const raw = (node?.textContent || "").trim();
      if (!raw) return null;
      const data = node.dataset.encoding === "gzip-base64" ? await decodeGzipBase64Json(raw) : JSON.parse(raw);
      state.onlineMode = true;
      return data;
    }

    async function loadLibraryIndex() {
      const embedded = await loadEmbeddedLibraryData();
      if (embedded) return embedded;

      const response = await fetch("library/videos.index.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    }

    async function init() {
      loadSavedState();
      applyPlayerWidth(state.playerWidth);
      syncPlayerPanelFromWidth();
      syncControls();
      try {
        const data = await loadLibraryIndex();
        state.dailyUpdates = normalizeDailyUpdates(data);
        renderDailyUpdate();
        state.allRecords = data.records || [];
        state.manualEdits = await loadManualEdits();
        state.indexStatus = "ready";
        applyManualEditsToRecords();
        renderStats();
        applyFilters();
      } catch (error) {
        state.indexStatus = "error";
        state.dailyUpdates = [];
        renderDailyUpdate();
        el.librarySummary.textContent = uiText("indexLoadFailed");
        el.clipGrid.innerHTML = `<div class="empty">${uiText("indexLoadHelp")}</div>`;
      }
    }

    if (el.dailyUpdate) {
      el.dailyUpdate.addEventListener("wheel", () => pauseDailyUpdateAutoScroll(), { passive: true });
      el.dailyUpdate.addEventListener("touchstart", () => pauseDailyUpdateAutoScroll(), { passive: true });
      el.dailyUpdate.addEventListener("focusin", () => pauseDailyUpdateAutoScroll());
      el.dailyUpdate.addEventListener("pointerenter", () => {
        dailyUpdatePointerInside = true;
      });
      el.dailyUpdate.addEventListener("pointerleave", () => {
        dailyUpdatePointerInside = false;
        pauseDailyUpdateAutoScroll(2500);
      });
    }

    el.searchInput.addEventListener("input", event => {
      state.query = event.target.value;
      state.renderLimit = LOAD_BATCH_SIZE;
      applyFilters();
    });
    el.clearButton.addEventListener("click", resetFilters);
    el.sortSelect.addEventListener("change", event => {
      state.sort = event.target.value;
      state.renderLimit = LOAD_BATCH_SIZE;
      applyFilters();
    });
    el.themeButton.addEventListener("click", () => {
      setTheme(state.theme === "dark" ? "light" : "dark");
      syncControls();
      saveState();
    });
    el.languageButton.addEventListener("click", () => {
      setLanguage(state.language === "zh" ? "en" : "zh");
      if (state.indexStatus === "ready") {
        renderStats();
        applyFilters();
        el.nowPlaying.textContent = state.selected ? nowPlayingText(state.selected) : uiText("selectClip");
      } else if (state.indexStatus === "error") {
        el.librarySummary.textContent = uiText("indexLoadFailed");
        el.clipGrid.innerHTML = `<div class="empty">${uiText("indexLoadHelp")}</div>`;
        renderInspector();
        syncControls();
        saveState();
      } else {
        renderInspector();
        syncControls();
        saveState();
      }
    });
    el.favoritesOnlyButton.addEventListener("click", () => {
      state.favoritesOnly = !state.favoritesOnly;
      state.renderLimit = LOAD_BATCH_SIZE;
      applyFilters();
    });
    el.autoplayButton.addEventListener("click", () => {
      state.autoplay = !state.autoplay;
      syncControls();
      saveState();
    });
    el.playResultsButton.addEventListener("click", () => {
      if (state.filtered.length) selectRecord(state.filtered[0], true);
    });
    el.loadMoreButton.addEventListener("click", () => {
      loadMoreResults();
    });
    el.galleryScroll.addEventListener("scroll", requestAutoLoadCheck, { passive: true });
    window.addEventListener("scroll", requestAutoLoadCheck, { passive: true });
    window.addEventListener("resize", () => {
      applyPlayerWidth(state.playerWidth);
      syncPlayerPanelFromWidth();
      syncDailyUpdateAutoScroll();
    });
    el.playerScrim.addEventListener("click", () => collapsePlayer("scrim"));
    el.playerExpandButton.addEventListener("click", () => expandPlayer("manual"));
    el.playerCollapseButton.addEventListener("click", () => collapsePlayer("manual"));
    el.sourceToggleButton.addEventListener("click", () => {
      const shouldPlay = Boolean(state.selected && !el.player.paused);
      state.playerSource = state.playerSource === PLAYER_SOURCE_TWITTER ? PLAYER_SOURCE_SERVER : PLAYER_SOURCE_TWITTER;
      applySelectedPlayerSource(state.selected, shouldPlay);
      syncControls();
      saveState();
    });
    el.playerResizeHandle.addEventListener("pointerdown", startPlayerResize);
    el.playerResizeHandle.addEventListener("pointermove", event => {
      if (event.pointerId === state.playerResizePointerId) resizePlayerFromPointer(event);
    });
    el.playerResizeHandle.addEventListener("pointerup", finishPlayerResize);
    el.playerResizeHandle.addEventListener("pointercancel", finishPlayerResize);
    el.playerResizeHandle.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        nudgePlayerWidth(PLAYER_RESIZE_STEP);
      } else if (event.key === "ArrowRight") {
        event.preventDefault();
        nudgePlayerWidth(-PLAYER_RESIZE_STEP);
      } else if (event.key === "Home") {
        event.preventDefault();
        applyPlayerWidth(PLAYER_MIN_WIDTH, true);
        syncPlayerPanelFromWidth();
      } else if (event.key === "End") {
        event.preventDefault();
        applyPlayerWidth(playerMaxWidth(), true);
        syncPlayerPanelFromWidth();
      }
    });
    el.prevButton.addEventListener("click", () => playOffset(-1));
    el.nextButton.addEventListener("click", () => playOffset(1));
    el.favoriteButton.addEventListener("click", toggleFavorite);
    el.copyPathButton.addEventListener("click", () => {
      if (state.selected) copyText(state.selected.video_path);
    });
    el.player.addEventListener("ended", () => {
      if (state.autoplay) playOffset(1);
    });
    document.addEventListener("keydown", event => {
      if (event.target.matches("input, textarea, select")) return;
      if (event.key === "Escape" && state.playerPanel === "expanded") {
        collapsePlayer("escape");
        return;
      }
      if (event.key === "ArrowRight") playOffset(1);
      if (event.key === "ArrowLeft") playOffset(-1);
      if (event.key.toLowerCase() === "f") toggleFavorite();
      if (event.key === " ") {
        event.preventDefault();
        if (el.player.paused) requestPlayerPlay();
        else el.player.pause();
      }
    });

    init();
  </script>
</body>
</html>
