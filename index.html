<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <link rel="icon" href="data:,">
  <title>分镜素材浏览器</title>
  <script id="library-data" type="text/plain" data-encoding="" translate="no" class="notranslate"></script>
  <script>
    (() => {
      const storageKey = "twitterdown-storyboard-browser-v1";
      const preferredTheme = () => window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
        document.documentElement.dataset.theme = saved.theme === "dark" || saved.theme === "light" ? saved.theme : preferredTheme();
      } catch {
        document.documentElement.dataset.theme = preferredTheme();
      }
    })();
  </script>
  <style>
    :root {
      --bg: #f6f4ee;
      --surface: #fbfaf6;
      --surface-2: #f5f3ed;
      --surface-3: #eeebe2;
      --line: #e3ded2;
      --line-2: #d1cabc;
      --text: #25251f;
      --muted: #626a62;
      --dim: #8b8b80;
      --green: #5f7d62;
      --blue: #4d758f;
      --gold: #9a7138;
      --red: #a95c55;
      --daily-update-text: #b95f12;
      --daily-update-bg: rgba(255, 248, 232, .42);
      --daily-update-border: rgba(185, 95, 18, .18);
      --daily-update-scroll-thumb: rgba(185, 95, 18, .28);
      --radius: 12px;
      --panel-radius: 18px;
      --shadow: 0 8px 18px rgba(65, 58, 45, .045);
      --shadow-soft: 0 1px 1px rgba(65, 58, 45, .035);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      height: 100%;
      background: var(--page-bg);
      color: var(--text);
      color-scheme: var(--page-color-scheme);
      font-family: "Segoe UI", "Microsoft YaHei UI", system-ui, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      min-height: 32px;
      padding: 0 10px;
      box-shadow: var(--shadow-soft);
    }

    button:hover {
      border-color: var(--line-2);
      background: var(--button-hover-bg);
    }

    button.active {
      border-color: var(--green);
      color: var(--button-active-text);
      background: var(--green);
    }

    button:disabled {
      cursor: default;
      opacity: .45;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    ::selection {
      background: var(--selection-bg);
      color: var(--selection-text);
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      min-width: 0;
      padding: 10px;
    }

    .masthead {
      border: 1px solid var(--line);
      border-radius: var(--panel-radius);
      background: var(--masthead-bg);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: max-content minmax(260px, .7fr) minmax(320px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px 18px;
    }

    .identity {
      min-width: 0;
    }

    .identity-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .identity h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
      white-space: nowrap;
    }

    .identity p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .daily-update {
      display: block;
      min-width: 0;
      max-width: 100%;
      max-height: 42px;
      padding: 3px 6px;
      border: 1px solid var(--daily-update-border);
      border-radius: 8px;
      background: var(--daily-update-bg);
      color: var(--daily-update-text);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      scroll-behavior: smooth;
      scroll-snap-type: y proximity;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }

    .daily-update::-webkit-scrollbar {
      width: 4px;
    }

    .daily-update::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: var(--daily-update-scroll-thumb);
    }

    .daily-update-item {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      min-height: 17px;
      scroll-snap-align: start;
    }

    .daily-update-item + .daily-update-item {
      margin-top: 3px;
    }

    .daily-update-item::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: currentColor;
      flex: 0 0 auto;
      opacity: .72;
    }

    .daily-update-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .daily-update[hidden] {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .daily-update {
        scroll-behavior: auto;
      }
    }

    .search-panel {
      min-width: 0;
    }

    .search-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .search-line input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      box-shadow: var(--input-base-shadow);
    }

    .search-line input {
      height: 40px;
      padding: 0 12px;
    }

    .search-line input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--green);
      box-shadow: var(--focus-ring);
    }

    .head-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .head-actions select {
      width: 138px;
      height: 34px;
      padding: 0 8px;
    }

    .workspace {
      --sidebar-width: 260px;
      --content-min-width: 340px;
      --player-min-width: 320px;
      --player-default-width: 860px;
      --player-width: var(--player-default-width);
      --layout-gap: 8px;
      min-height: 0;
      min-width: 0;
      position: relative;
      display: grid;
      gap: var(--layout-gap);
      grid-template-columns:
        var(--sidebar-width)
        minmax(var(--content-min-width), 1fr)
        minmax(var(--player-min-width), min(var(--player-width), calc(100% - var(--sidebar-width) - var(--content-min-width) - var(--layout-gap) - var(--layout-gap))));
    }

    .sidebar,
    .content,
    .inspector {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar {
      border: 1px solid var(--line);
      border-radius: var(--panel-radius);
      background: var(--sidebar-bg);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .sidebar-top {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 9px;
      min-width: 0;
      box-shadow: var(--shadow-soft);
    }

    .stat strong {
      display: block;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 750;
    }

    .stat span {
      color: var(--muted);
      font-size: 11px;
    }

    .filters {
      overflow: auto;
      padding: 14px;
    }

    .filter-block {
      margin-bottom: 18px;
    }

    .filter-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--filter-title-text);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .filter-title span:last-child {
      color: var(--dim);
    }

    summary.filter-title {
      cursor: pointer;
      list-style: none;
    }

    summary.filter-title::-webkit-details-marker {
      display: none;
    }

    details.filter-block:not([open]) .filter-title {
      margin-bottom: 0;
    }

    .facet-list {
      display: grid;
      gap: 6px;
    }

    .facet-list button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      text-align: left;
      width: 100%;
      min-height: 31px;
      padding: 5px 8px;
      background: var(--surface-2);
    }

    .facet-list .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .facet-list .count {
      color: var(--muted);
      font-size: 12px;
    }

    .facet-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: stretch;
    }

    .facet-row .facet-action {
      width: auto;
      grid-template-columns: 1fr;
      color: var(--red);
      border-color: var(--facet-action-border);
      text-align: center;
      white-space: nowrap;
    }

    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
      height: 87px;
      overflow-y: auto;
      align-content: flex-start;
      scrollbar-gutter: stable;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 25px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--control-text);
      font-size: 12px;
    }

    .pill.clear {
      color: var(--red);
    }

    .content {
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 1px solid var(--line);
      border-radius: var(--panel-radius);
      background: var(--content-bg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .results-head {
      border-bottom: 1px solid var(--line);
      background: var(--results-head-bg);
      padding: 13px 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    .results-title {
      min-width: 0;
    }

    .results-title strong {
      display: block;
      font-size: 16px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .results-title span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-strip {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
    }

    .summary-chip {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--control-text);
      font-size: 12px;
      white-space: nowrap;
      box-shadow: var(--shadow-soft);
    }

    .summary-chip strong {
      color: var(--green);
      font-weight: 750;
    }

    .gallery-scroll {
      overflow: auto;
      padding: 18px;
      background: var(--gallery-bg);
    }

    .clip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .clip-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
      cursor: pointer;
      min-width: 0;
      box-shadow: var(--shadow-soft);
    }

    .clip-card:hover {
      border-color: var(--line-2);
      box-shadow: var(--clip-card-hover-shadow);
    }

    .clip-card.active {
      border-color: var(--green);
      box-shadow: var(--clip-card-active-shadow);
    }

    .poster {
      position: relative;
      aspect-ratio: 16 / 9;
      min-height: 145px;
      background: var(--poster-bg);
      border-bottom: 1px solid var(--line);
    }

    .poster img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--poster-bg);
    }

    .card-badge,
    .duration {
      position: absolute;
      border-radius: 5px;
      border: 1px solid var(--badge-border);
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 12px;
      padding: 3px 7px;
      box-shadow: var(--badge-shadow);
    }

    .card-badge {
      left: 8px;
      top: 8px;
      color: var(--green);
    }

    .duration {
      right: 8px;
      bottom: 8px;
    }

    .favorite-toggle {
      position: absolute;
      right: 6px;
      top: 6px;
      z-index: 2;
      width: 56px;
      height: 56px;
      min-height: 56px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      background: transparent !important;
      color: var(--favorite-toggle-color);
      line-height: 1;
      box-shadow: none !important;
    }

    .favorite-toggle svg {
      width: 48px;
      height: 48px;
      display: block;
      fill: currentColor;
      stroke: none;
      stroke-width: 0;
      stroke-linejoin: round;
      filter: none;
    }

    .favorite-toggle:hover,
    .favorite-toggle.favorited {
      color: var(--favorite-toggle-accent);
      background: transparent !important;
      box-shadow: none !important;
    }

    .favorite-toggle:focus-visible {
      outline: 2px solid var(--favorite-toggle-accent);
      outline-offset: 2px;
    }

    .card-body {
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .card-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .card-title strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
    }

    .category {
      color: var(--gold);
      flex: 0 0 auto;
      font-size: 12px;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      height: 76px;
      align-content: flex-start;
      overflow: hidden;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 22px;
      padding: 1px 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--control-muted);
      font-size: 11px;
      cursor: pointer;
    }

    .tag-chip.source {
      color: var(--blue);
    }

    .tag-chip.story {
      color: var(--gold);
      border-color: var(--tag-story-border);
      background: var(--tag-story-bg);
    }

    .card-meta {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-shot-info {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .load-more {
      padding: 12px 18px 18px;
      background: var(--load-more-bg);
      border-top: 1px solid var(--line);
    }

    .load-more button {
      width: 100%;
      min-height: 38px;
    }

    .inspector {
      position: relative;
      z-index: 1;
      border: 1px solid var(--line);
      border-radius: var(--panel-radius);
      background: var(--sidebar-bg);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .player-scrim {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: var(--player-scrim-bg);
      display: none;
    }

    .player-scrim[hidden] {
      display: none;
    }

    .player-resize-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      left: -6px;
      z-index: 3;
      width: 12px;
      cursor: col-resize;
      touch-action: none;
    }

    .player-resize-handle::before {
      content: "";
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 5px;
      width: 2px;
      border-radius: 999px;
      background: var(--line-2);
      opacity: .45;
    }

    .player-resize-handle:hover::before,
    .player-resize-handle:focus-visible::before,
    body.is-resizing-player .player-resize-handle::before {
      background: var(--green);
      opacity: 1;
    }

    .player-resize-handle:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: -2px;
    }

    body.is-resizing-player {
      cursor: col-resize;
      user-select: none;
    }

    .player-zone {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--player-zone-bg);
      display: grid;
      gap: 11px;
    }

    .player-content {
      display: grid;
      gap: 11px;
      min-width: 0;
    }

    .player-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .player-toolbar-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .inspector[data-player-state="collapsed"] {
      box-shadow: var(--shadow);
    }

    .inspector[data-player-state="collapsed"] #playerCollapseButton,
    .inspector[data-player-state="expanded"] #playerExpandButton {
      display: none;
    }

    .inspector[data-player-state="collapsed"] #playerExpandButton,
    .inspector[data-player-state="expanded"] #playerCollapseButton {
      display: inline-flex;
    }

    .video-frame {
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--video-frame-bg);
      overflow: hidden;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      background: var(--poster-bg);
    }

    .now-playing {
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
      min-height: 36px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .player-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .manual-category-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .manual-category-actions button {
      flex: 1 1 112px;
      min-height: 34px;
    }

    .inspector-scroll {
      overflow: auto;
      padding: 14px 16px 18px;
      display: grid;
      align-content: start;
      gap: 15px;
      background: var(--inspector-scroll-bg);
    }

    .panel {
      display: grid;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel-bg);
      padding: 14px;
      box-shadow: var(--shadow-soft);
    }

    .panel h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .meta-table {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 7px 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .meta-table span:nth-child(even) {
      color: var(--text);
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .group-list {
      display: grid;
      gap: 7px;
    }

    .mini-item {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 6px;
      cursor: pointer;
    }

    .mini-item.active {
      border-color: var(--green);
    }

    .mini-item img {
      width: 82px;
      aspect-ratio: 16 / 9;
      object-fit: contain;
      background: var(--poster-bg);
      border-radius: 5px;
    }

    .mini-text {
      min-width: 0;
      color: var(--text);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tweet-text {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .empty {
      border: 1px dashed var(--empty-border);
      border-radius: var(--radius);
      background: var(--empty-bg);
      padding: 18px;
      color: var(--empty-text);
      font-size: 13px;
      line-height: 1.5;
    }

    .empty code {
      color: var(--empty-code-text);
    }

    :root {
      --page-bg: linear-gradient(135deg, #f8f6f1 0%, #f6f4ee 58%, #f4f1ea 100%);
      --page-color-scheme: light;
      --selection-bg: rgba(95, 125, 98, .22);
      --selection-text: var(--text);
      --button-hover-bg: #faf7ef;
      --button-active-text: #f9fbf6;
      --button-base-shadow: none;
      --button-hover-shadow: var(--control-shadow);
      --button-press-shadow: inset 0 1px 3px rgba(45, 58, 49, .16);
      --button-disabled-opacity: .45;
      --input-base-shadow: inset 0 1px 0 rgba(255, 255, 255, .72);
      --input-control-shadow: inset 0 1px 2px rgba(45, 58, 49, .07);

    * {
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) transparent;
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
      border-radius: 999px;
    }

    *::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border: 3px solid transparent;
      border-radius: 999px;
      background-clip: content-box;
    }

    *::-webkit-scrollbar-thumb:hover {
      background-color: var(--scrollbar-thumb-hover);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-color: var(--control-border);
      border-radius: 999px;
      background: var(--control-bg);
      color: var(--control-text);
      min-height: 34px;
      padding: 0 13px;
      box-shadow: var(--button-base-shadow);
      transition: background-color .16s ease, border-color .16s ease, box-shadow .16s ease, color .16s ease;
    }

    button:hover:not(:disabled) {
      border-color: var(--control-border-strong);
      background: var(--control-hover);
      box-shadow: var(--button-hover-shadow);
    }

    button:active:not(:disabled) {
      box-shadow: var(--button-press-shadow);
    }

    button:disabled {
      opacity: var(--button-disabled-opacity);
    }

    button.active,
    button[aria-pressed="true"] {
      border-color: var(--control-border-strong);
      background: var(--control-active);
      color: var(--control-accent);
      box-shadow: inset 0 0 0 1px var(--control-accent-soft);
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    .mini-item:focus-visible {
      outline: 0;
      border-color: var(--control-accent);
      box-shadow: 0 0 0 3px var(--control-accent-soft);
    }

    .search-line input,
    select,
    textarea {
      border-color: var(--control-border);
      border-radius: 999px;
      background-color: var(--control-raised);
      color: var(--control-text);
      box-shadow: var(--input-control-shadow);
      transition: border-color .16s ease, box-shadow .16s ease, background-color .16s ease;
    }

    .search-line input {
      height: 42px;
      padding: 0 16px;
    }

    select {
      appearance: none;
      padding-right: 31px;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--control-muted) 50%),
        linear-gradient(135deg, var(--control-muted) 50%, transparent 50%);
      background-position:
        calc(100% - 17px) 50%,
        calc(100% - 12px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    .search-line input::placeholder {
      color: var(--placeholder-text);
    }

    .search-line input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--control-accent);
      background-color: var(--input-focus-bg);
      box-shadow: 0 0 0 3px var(--control-accent-soft);
    }

    select option {
      background: var(--select-option-bg);
      color: var(--select-option-text);
    }

    .head-actions select {
      height: 36px;
      border-radius: 999px;
      padding-left: 12px;
    }

    .head-actions button,
    .player-toolbar-actions button {
      min-height: 36px;
      white-space: nowrap;
    }

    .facet-list {
      gap: 7px;
    }

    .facet-list button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      min-height: 32px;
      padding: 5px 6px 5px 11px;
      border-color: transparent;
      border-radius: 999px;
      background: var(--facet-bg);
      color: var(--control-text);
      justify-content: stretch;
      box-shadow: none;
    }

    .facet-list button:hover:not(:disabled) {
      border-color: var(--control-border);
      background: var(--control-raised);
      box-shadow: var(--facet-hover-shadow);
    }

    .facet-list button.active {
      border-color: var(--control-border-strong);
      background: var(--control-active);
      color: var(--control-accent);
    }

    .facet-list .count {
      min-width: 24px;
      padding: 1px 7px;
      border-radius: 999px;
      background: var(--facet-count-bg);
      color: var(--control-muted);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .facet-list button.active .count {
      background: var(--facet-active-count-bg);
      color: var(--control-accent);
    }

    .facet-row .facet-action {
      color: var(--control-danger);
      border-color: var(--facet-action-border);
      background: var(--facet-action-bg);
    }

    .pill,
    .summary-chip,
    .tag-chip {
      border-radius: 999px;
      border-color: var(--control-border);
      background: var(--chip-bg);
      color: var(--control-text);
    }

    button.pill:hover,
    .tag-chip:hover {
      border-color: var(--control-border-strong);
      background: var(--control-raised);
      box-shadow: var(--chip-hover-shadow);
    }

    .pill.clear {
      color: var(--control-danger);
      border-color: var(--pill-clear-border);
      background: var(--pill-clear-bg);
    }

    .summary-chip {
      min-height: 30px;
      padding: 0 7px 0 10px;
      flex: 0 0 auto;
    }

    .summary-chip strong {
      min-width: 24px;
      padding: 1px 7px;
      border-radius: 999px;
      background: var(--control-active);
      color: var(--control-accent);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .tag-chip {
      min-height: 24px;
      padding: 1px 9px;
      background: var(--facet-bg);
      color: var(--control-muted);
    }

    .tag-chip.source {
      color: var(--tag-source-text);
      border-color: var(--tag-source-border);
      background: var(--tag-source-bg);
    }

    .tag-chip.story {
      color: var(--tag-story-text);
      border-color: var(--tag-story-border);
      background: var(--tag-story-bg);
    }

    .results-head {
      grid-template-columns: minmax(0, 1fr);
      align-items: start;
    }

    .summary-strip {
      justify-content: flex-start;
      flex-wrap: wrap;
      max-height: 68px;
      overflow: hidden;
    }

    .load-more button {
      min-height: 40px;
      border-style: dashed;
      background: var(--chip-bg);
    }

    .card-badge,
    .duration {
      border: 1px solid var(--badge-border);
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      box-shadow: var(--badge-shadow);
    }

    .card-badge {
      color: var(--control-accent);
    }

    .favorite-toggle {
      width: 56px;
      height: 56px;
      min-height: 56px;
      border: 0;
      background: transparent !important;
      color: var(--favorite-toggle-color);
      box-shadow: none !important;
      backdrop-filter: none;
    }

    .favorite-toggle svg {
      width: 48px;
      height: 48px;
      stroke: none;
      stroke-width: 0;
      filter: none;
    }

    .favorite-toggle:hover,
    .favorite-toggle.favorited,
    .favorite-toggle[aria-pressed="true"] {
      background: transparent !important;
      color: var(--favorite-toggle-accent);
      box-shadow: none !important;
    }

    .favorite-toggle:hover svg,
    .favorite-toggle.favorited svg,
    .favorite-toggle[aria-pressed="true"] svg {
      stroke: none;
    }

    .favorite-toggle:focus-visible {
      outline: 2px solid var(--favorite-toggle-accent);
      outline-offset: 2px;
      box-shadow: none;
    }

    .player-resize-handle::before {
      left: 4px;
      width: 4px;
      background: var(--resize-handle-bg);
    }

    .player-resize-handle:hover::before,
    .player-resize-handle:focus-visible::before,
    body.is-resizing-player .player-resize-handle::before {
      background: var(--control-accent);

<body>
  <div class="shell">
    <header class="masthead">
      <div class="identity">
        <div class="identity-head">
          <h1 data-i18n="appTitle">分镜素材浏览器</h1>

      <div class="search-panel">

        </div>
      </div>

      <div class="head-actions">
        <select id="sortSelect" aria-label="排序" data-i18n-aria-label="sortAria">

          <option value="date-asc" data-i18n="sortDateAsc">最早优先</option>
          <option value="duration-desc" data-i18n="sortDurationDesc">时长最长</option>
          <option value="duration-asc" data-i18n="sortDurationAsc">时长最短</option>
          <option value="author" data-i18n="sortAuthor">作者分组</option>
        </select>
        <button id="themeButton" type="button" aria-pressed="false">浅色模式</button>
        <button id="languageButton" type="button" aria-pressed="false">English</button>
        <button id="favoritesOnlyButton" type="button" data-i18n="favoritesOnly">只看收藏</button>
        <button id="autoplayButton" type="button" data-i18n="autoplay">连续播放</button>
        <button id="playResultsButton" type="button" data-i18n="playResults">播放结果</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="stat-grid" id="statGrid"></div>
          <div class="active-filters" id="activeFilters"></div>
        </div>
        <div class="filters">
          <section class="filter-block">
            <div class="filter-title"><span data-i18n="categoryFilter">类别</span><span id="categoryCount"></span></div>
            <div class="facet-list" id="categoryFacet"></div>
          </section>
          <section class="filter-block">
            <div class="filter-title"><span data-i18n="commonTagsFilter">常用标签</span><span id="storyboardTagCount"></span></div>
            <div class="facet-list" id="storyboardTagFacet"></div>
          </section>
          <section class="filter-block">
            <div class="filter-title"><span data-i18n="twitterTagsFilter">Twitter标签</span><span id="tagCount"></span></div>
            <div class="facet-list" id="tagFacet"></div>
          </section>
          <details class="filter-block">
            <summary class="filter-title"><span data-i18n="authorFilter">作者</span><span id="authorCount"></span></summary>
            <div class="facet-list" id="authorFacet"></div>
          </details>
        </div>
      </aside>

      <main class="content">
        <div class="results-head">
          <div class="results-title">
            <strong id="resultTitle" data-i18n="resultTitleIdle">素材</strong>
            <span id="resultSubtitle" data-i18n="resultSubtitleIdle">等待索引</span>
          </div>
          <div class="summary-strip" id="summaryStrip"></div>
        </div>
        <div class="gallery-scroll">
          <div class="clip-grid" id="clipGrid"></div>
        </div>
        <div class="load-more" id="loadMoreWrap">
          <button id="loadMoreButton" type="button" data-i18n="loadMoreIdle">加载更多</button>
        </div>
      </main>

      <div class="player-scrim" id="playerScrim" hidden></div>
      <aside class="inspector" data-player-state="collapsed">
        <div
          class="player-resize-handle"
          id="playerResizeHandle"
          role="separator"
          aria-orientation="vertical"
          aria-label="调整播放器列宽"
          data-i18n-aria-label="resizePlayer"
          tabindex="0"
        ></div>
        <div class="player-zone">
          <div class="player-content">
            <div class="player-toolbar">
              <span data-i18n="player">播放器</span>
              <div class="player-toolbar-actions">
                <button id="playerExpandButton" type="button" aria-label="展开播放器" aria-expanded="false" data-i18n="expand" data-i18n-aria-label="expandPlayer">展开</button>
                <button id="playerCollapseButton" type="button" aria-label="收起播放器" aria-expanded="false" data-i18n="collapse" data-i18n-aria-label="collapsePlayer">收起</button>
                <button id="sourceToggleButton" type="button" aria-pressed="true" hidden style="display: none;">Twitter/X 源</button>
              </div>
            </div>
            <div class="video-frame">
              <video id="player" controls playsinline></video>
            </div>
            <div class="now-playing" id="nowPlaying" data-i18n="selectClip">选择一个素材开始播放</div>
            <div class="player-actions">
              <button id="prevButton" type="button" data-i18n="previous">上一个</button>
              <button id="nextButton" type="button" data-i18n="next">下一个</button>
              <button id="favoriteButton" type="button">收藏</button>
              <button id="copyPathButton" type="button" data-i18n="copyPath">复制路径</button>
            </div>
          </div>
        </div>
        <div class="inspector-scroll" id="inspectorScroll">
          <div class="empty" data-i18n="inspectorHint">左侧筛选素材，中间点击卡片。播放器会跟随当前筛选结果。</div>
        </div>
      </aside>
    </div>
  </div>

    function normalizeTheme(value) {
      return value === "dark" || value === "light" ? value : "";
    }

    function preferredTheme() {
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function normalizeLanguage(value) {
      return value === "zh" || value === "en" ? value : "";
    }

    function readSavedTheme() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return normalizeTheme(saved.theme);
      } catch {
        return "";
      }

    function uiText(key, vars = {}) {

      const value = Object.prototype.hasOwnProperty.call(pack, key) ? pack[key] : fallback;

    function firstPresent(...values) {
      return values.find(value => value !== undefined && value !== null && value !== "");
    }

    function dateLabelFrom(value) {
      const match = String(value || "").match(/\d{4}-\d{2}-\d{2}/);
      return match ? match[0] : "";

    function todayDateLabel() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    }

    function normalizeUpdateCount(value) {
      const count = Number(value);
      return Number.isFinite(count) && count >= 0 ? Math.floor(count) : null;
    }

    function normalizeUpdateCollection(value) {
      if (value === undefined || value === null || value === "") return [];
      if (Array.isArray(value)) return value;
      if (typeof value === "object") {
        const nested = firstPresent(
          value.items,
          value.updates,
          value.feed,
          value.update_feed,
          value.updateFeed,
          value.daily_updates,
          value.dailyUpdates
        );
        if (Array.isArray(nested)) return nested;
      }
      return [value];
    }

    function normalizeUpdateItem(source, data, options = {}) {
      const sourceObject = source && typeof source === "object" && !Array.isArray(source) ? source : null;
      const date = dateLabelFrom(firstPresent(
        sourceObject?.date,
        sourceObject?.day,
        sourceObject?.update_date,
        sourceObject?.updateDate,
        sourceObject?.updated_at,
        sourceObject?.updatedAt,
        sourceObject?.generated_at,
        sourceObject?.generatedAt,
        data?.generated_at,
        data?.updated_at,
        data?.updateDate
      )) || todayDateLabel();

      if (!sourceObject) {
        const count = normalizeUpdateCount(source);
        if (count === null && source !== undefined && source !== null && source !== "") {
          return { text: String(source), date, count: null, kind: options.kind || "daily" };
        }
        return { date, count: count ?? (options.assumeZeroCount ? 0 : null), kind: options.kind || "daily" };
      }

      const displayText = options.preferDisplayText ? firstPresent(
        sourceObject.display_text,
        sourceObject.displayText,
        sourceObject.text,
        sourceObject.message
      ) : null;
      const count = normalizeUpdateCount(firstPresent(
        sourceObject.new_count,
        sourceObject.newCount,
        sourceObject.added_count,
        sourceObject.addedCount,
        sourceObject.added,
        sourceObject.new,
        sourceObject.count,
        sourceObject.clip_count,
        sourceObject.clipCount,
        sourceObject.record_count,
        sourceObject.recordCount,
        sourceObject.records,
        sourceObject.counts?.new,
        sourceObject.counts?.visible_new,
        sourceObject.counts?.downloaded
      ));
      return {
        text: displayText ? String(displayText) : "",
        date,
        count: count ?? (options.assumeZeroCount ? 0 : null),
        label: firstPresent(sourceObject.label, sourceObject.title, sourceObject.name, options.label),
        kind: firstPresent(sourceObject.kind, sourceObject.type, options.kind, "daily")
      };
    }

    function normalizeDailyUpdates(data) {
      if (!data || typeof data !== "object") return [];
      const feedCandidates = [
        data.update_feed,
        data.updateFeed,
        data.daily_updates,
        data.dailyUpdates,
        data.summary?.update_feed,
        data.summary?.updateFeed,
        data.summary?.daily_updates,
        data.summary?.dailyUpdates,
        data.update?.update_feed,
        data.update?.updateFeed,
        data.update?.daily_updates,
        data.update?.dailyUpdates
      ];
      for (const candidate of feedCandidates) {
        const items = normalizeUpdateCollection(candidate)
          .map(item => normalizeUpdateItem(item, data, { preferDisplayText: true }))
          .filter(Boolean);
        if (items.length) return items;
      }

      const legacyCandidates = [
        data.daily_update,
        data.dailyUpdate,
        data.summary?.daily_update,
        data.summary?.dailyUpdate,
        data.update?.daily_update,
        data.update?.dailyUpdate,
        data.update?.daily,
        data.daily,
        data.update
      ];
      for (const candidate of legacyCandidates) {
        const items = normalizeUpdateCollection(candidate)
          .map(item => normalizeUpdateItem(item, data, { assumeZeroCount: true }))
          .filter(Boolean);
        if (items.length) return items;
      }
      return [];
    }

    function dailyUpdateItemText(info) {
      if (info.text) return info.text;
      const date = info.date || todayDateLabel();
      const label = info.label || (info.kind && info.kind !== "daily" ? info.kind : "");
      if (label) {
        if (info.count === null) return state.language === "en" ? `${label}: ${date}` : `${label}：${date}`;
        return info.count > 0
          ? uiText("updateFeedItem", { label, date, count: info.count })
          : uiText("updateFeedItemEmpty", { label, date });
      }
      const dailyInfo = { date, count: info.count ?? 0 };
      return dailyInfo.count > 0
        ? uiText("dailyUpdate", dailyInfo)
        : uiText("dailyUpdateEmpty", dailyInfo);
    }

      if (!node || node.hidden || state.dailyUpdates.length <= DAILY_UPDATE_VISIBLE_COUNT || prefersReducedMotion()) return;
      window.requestAnimationFrame(() => {
        if (!node || node.hidden || node.scrollHeight <= node.clientHeight + 1) return;
        dailyUpdateAutoScrollTimer = window.setInterval(() => {
          if (dailyUpdatePointerInside || Date.now() < dailyUpdateManualPauseUntil) return;
          const firstItem = node.querySelector(".daily-update-item");
          const step = firstItem ? firstItem.offsetHeight + 3 : Math.max(1, Math.floor(node.clientHeight / DAILY_UPDATE_VISIBLE_COUNT));
          const atEnd = node.scrollTop + node.clientHeight >= node.scrollHeight - 1;
          node.scrollTo({ top: atEnd ? 0 : Math.min(node.scrollTop + step, node.scrollHeight), behavior: "smooth" });
        }, DAILY_UPDATE_AUTO_SCROLL_MS);
      });
    }

      const fragment = document.createDocumentFragment();
